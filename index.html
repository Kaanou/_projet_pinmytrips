<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PinMyTrips" />
  <meta name="theme-color" content="#0f5c5f" />
  <title>PinMyTrips</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=clash-display@500,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="panel" id="panel">
      <div class="panel-header">
        <div class="brand">
          <h1>PinMyTrips</h1>
          <div class="brand-actions">
            <button type="button" class="btn-icon" id="themeButton" aria-label="Basculer le thème"><i data-feather="moon"></i></button>
            <button type="button" class="btn-icon" id="exportButton" aria-label="Exporter les données"><i data-feather="download"></i></button>
            <label class="btn-icon" aria-label="Importer les données">
              <i data-feather="upload"></i>
              <input type="file" id="importFile" accept=".json" hidden>
            </label>
          </div>
        </div>

        <div class="toolbar-actions">
          <button type="button" class="btn btn-primary" id="addPlaceButton"><i data-feather="plus"></i> Ajouter</button>
          <input type="search" id="search" placeholder="Rechercher..." autocomplete="off">
        </div>
      </div>

      <div class="places-list" id="placesList" aria-live="polite"></div>
    </aside>

    <main class="map-shell">
      <div id="map"></div>
      <div class="floating-detail" id="detailPanel" aria-hidden="true">
        <div class="detail-cover" id="detailCover">
          <button type="button" class="detail-close" id="closeDetailButton" aria-label="Fermer le détail"><i data-feather="x"></i></button>
        </div>
        <div class="detail-body" id="detailBody"></div>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 id="modalTitle">Ajouter une étape</h2>
        <button type="button" class="btn-icon" id="closeModalButton" aria-label="Fermer le modal"><i data-feather="x"></i></button>
      </div>
      <form id="placeForm" class="form-grid">
        <input type="hidden" id="f_id">
        <div class="grid-2">
          <label>
            Lieu
            <input id="f_title" required placeholder="Ex: Kyoto">
          </label>
          <label>
            Pays
            <input id="f_country" required>
          </label>
        </div>

        <div class="grid-2">
          <label>
            Dates
            <input id="f_dates" placeholder="Ex: Mai 2026">
          </label>
          <label>
            Budget total
            <input type="number" id="f_budget" placeholder="€" min="0">
          </label>
        </div>

        <label>
          Photo souvenir (stockée localement)
          <input type="file" id="f_photo" accept="image/*">
          <input type="hidden" id="f_photo_b64">
        </label>

        <div class="grid-2">
          <label>
            Note de l'expérience
            <select id="f_rating">
              <option value="5">⭐⭐⭐⭐⭐ Incroyable</option>
              <option value="4">⭐⭐⭐⭐ Très bien</option>
              <option value="3">⭐⭐⭐ Sympa</option>
              <option value="2">⭐⭐ Bof</option>
              <option value="1">⭐ À fuir</option>
            </select>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="f_fav"> Coup de cœur ❤️
          </label>
        </div>

        <div class="grid-2">
          <label>
            Latitude
            <input type="number" step="any" id="f_lat" required>
          </label>
          <label>
            Longitude
            <input type="number" step="any" id="f_lng" required>
          </label>
        </div>

        <label>
          Adresses (Restos, Bars...)
          <textarea id="f_spots" rows="2" placeholder="Séparés par des virgules"></textarea>
        </label>

        <label>
          Notes & Anecdotes
          <textarea id="f_notes" rows="3"></textarea>
        </label>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="btnDelete" style="display:none"><i data-feather="trash"></i></button>
          <button type="submit" class="btn btn-primary">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
